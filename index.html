<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Certifications Portfolio</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #030303;
            --surface-color: rgba(15, 15, 15, 0.6);
            --surface-border: rgba(255, 255, 255, 0.04);
            --text-primary: #f8f8f8;
            --text-secondary: #8c8c8c;
            --accent-primary: #D4AF37;
            --accent-secondary: #F3E5AB;
            --gradient-accent: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.035;
            pointer-events: none;
            z-index: 99999;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Abstract glowing background */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #050505;
        }
        
        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
        }

        .blob-2 {
            bottom: -10%; right: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.2) translate(5%, 5%); }
            100% { transform: scale(0.9) translate(-5%, -5%); }
        }

        header {
            text-align: center;
            padding: 5rem 2rem 3rem;
            position: relative;
        }

        .premium-pill {
            display: inline-block;
            padding: 0.5rem 2.5rem;
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-primary);
            margin-bottom: 1.5rem;
            position: relative;
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.05);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #c4c4c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .highlight {
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Grid */
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        /* Certificate Card */
        .cert-card {
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeUp 0.8s ease forwards;
            border: 1px solid transparent;
            background: linear-gradient(var(--bg-color), var(--bg-color)) padding-box,
                        var(--surface-border) border-box;
            background-clip: padding-box, border-box;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .cert-card:hover {
            background: linear-gradient(#111, #080808) padding-box,
                        linear-gradient(135deg, var(--accent-primary), rgba(255,255,255,0.05), var(--text-primary)) border-box;
            background-clip: padding-box, border-box;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            z-index: 20;
        }

        #cursor-glow {
            position: fixed;
            top: 0; left: 0;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: width 0.3s, height 0.3s, background 0.3s;
        }

        header, main {
            position: relative;
            z-index: 10;
        }

        .cert-thumbnail {
            width: 100%;
            height: 220px;
            position: relative;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--surface-border);
        }

        .cert-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            opacity: 0.8;
        }

        .cert-card:hover .cert-thumbnail img {
            transform: scale(1.08);
            opacity: 0.4;
        }

        .pdf-icon {
            font-size: 5rem;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.9;
        }

        /* View Button Overlay */
        .view-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
        }

        .cert-card:hover .view-overlay {
            opacity: 1;
        }

        .view-btn {
            background: transparent;
            color: var(--text-primary);
            padding: 0.8rem 2rem;
            border-radius: 4px;
            border: 1px solid var(--accent-primary);
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            transform: translateY(20px);
            transition: all 0.3s ease;
            box-shadow: inset 0 0 0 rgba(212,175,55,0);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(168, 85, 247, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10000;
            transition: background 0.3s, transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .modal-body {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-body img, .modal-body iframe {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
            object-fit: contain;
            border: none;
            width: 100%;
            height: 100%;
        }

        .cert-card:hover .view-btn {
            transform: translateY(0);
        }

        .view-btn:hover {
            box-shadow: inset 0 0 15px rgba(212,175,55,0.4);
            background: rgba(212,175,55,0.1);
            transform: scale(1.02) translateY(0);
        }

        /* Card Content */
        .cert-info {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .cert-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .cert-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .file-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .cert-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <div class="premium-pill">Welcome To</div>
        <h1>Bhoompally's <span class="highlight">Space 1</span></h1>
        <p class="subtitle">A curated collection of my professional achievements, online training, and recognitions.</p>
    </header>

    <main>
        <div class="cert-grid" id="cert-container">
            <!-- Cards generated dynamically -->
        </div>
    </main>

    <!-- Modal -->
    <div class="modal" id="certModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-body" id="modalBody">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script>
        // Array of certification objects corresponding to real local files
        const certificates = [
            { 
                title: "Smart India Hackathon - Lexicon Legends", 
                file: "B.Kalyan Reddy_Lexicon Legends SIH.pdf", 
                type: "Certificate",
                isPdf: true
            },
            { 
                title: "Introduction to Claude Certification", 
                file: "certificate ( introduction to claude ).pdf", 
                type: "AI Training",
                isPdf: true
            },
            { 
                title: "Claude 101 Certification", 
                file: "certificate-(Claude-101).pdf", 
                type: "AI Training",
                isPdf: true
            },
            { 
                title: "IA Online Training", 
                file: "IA Online Training Certificate.pdf", 
                type: "Online Course",
                isPdf: true
            },
            { 
                title: "International Journal Publication", 
                file: "international journal paper certificate.pdf", 
                type: "Publication",
                isPdf: true
            },
            { 
                title: "OutSkill Training Certification", 
                file: "OutSkill-Certificate.png.png", 
                type: "Training",
                isPdf: false
            },
            { 
                title: "Professional Achievement", 
                file: "Screenshot 2026-04-10 080549.png", 
                type: "Certification",
                isPdf: false
            },
            { 
                title: "Skill Assessment Proficiency", 
                file: "Screenshot 2026-04-10 080642.png", 
                type: "Certification",
                isPdf: false
            },
            { 
                title: "Advanced Technical Badge", 
                file: "Screenshot 2026-04-10 080714.png", 
                type: "Certification",
                isPdf: false
            },
            { 
                title: "Core Competency Certificate", 
                file: "Screenshot 2026-04-10 080738.png", 
                type: "Certification",
                isPdf: false
            },
            { 
                title: "Specialized Training Completion", 
                file: "Screenshot 2026-04-10 080859.png", 
                type: "Certification",
                isPdf: false
            }
        ];

        const container = document.getElementById('cert-container');

        certificates.forEach((cert, index) => {
            const card = document.createElement('div');
            card.className = 'cert-card';
            card.style.animationDelay = `${index * 0.08}s`;

            // If it's a PDF, we show a sleek PDF icon, otherwise we load the actual image thumbnail
            const thumbnailHTML = cert.isPdf 
                ? `<i class="fa-solid fa-file-pdf pdf-icon"></i>`
                : `<img src="${cert.file}" alt="${cert.title}">`;

            // Get file extension for the meta tag
            let extension = cert.file.split('.').pop().toUpperCase();
            if (cert.file.includes('.png.png')) {
                extension = 'PNG'; // Clean duplicate extension edge case
            }

            card.innerHTML = `
                <div class="cert-thumbnail">
                    ${thumbnailHTML}
                    <div class="view-overlay">
                        <button class="view-btn" onclick="openModal(${index})">
                            <i class="fa-solid fa-eye"></i> View Certificate
                        </button>
                    </div>
                </div>
                <div class="cert-info">
                    <div>
                        <div class="cert-type">${cert.type}</div>
                        <h3 class="cert-title">${cert.title}</h3>
                    </div>
                    <div class="file-meta">
                        <i class="fa-solid ${cert.isPdf ? 'fa-file-pdf' : 'fa-image'}"></i> 
                        ${extension} FILE
                    </div>
                </div>
            `;

            container.appendChild(card);

            // 3D Tilt Effect
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -10;
                const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 10;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                card.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            });
            card.addEventListener('mouseenter', () => {
                card.style.transition = 'transform 0.1s';
            });
        });

        // Mouse Glow Logic
        const cursorGlow = document.createElement('div');
        cursorGlow.id = 'cursor-glow';
        document.body.appendChild(cursorGlow);
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });
        
        // Add interactive glow when hovering over critical elements
        setTimeout(() => {
            document.querySelectorAll('.view-btn, .close-btn, .cert-card').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorGlow.style.background = 'radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%)';
                    cursorGlow.style.width = '600px';
                    cursorGlow.style.height = '600px';
                });
                el.addEventListener('mouseleave', () => {
                    cursorGlow.style.background = 'radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 70%)';
                    cursorGlow.style.width = '400px';
                    cursorGlow.style.height = '400px';
                });
            });
        }, 500);

        // Modal Logic
        const modal = document.getElementById('certModal');
        const modalBody = document.getElementById('modalBody');

        function openModal(index) {
            const cert = certificates[index];
            modalBody.innerHTML = ''; // Clear previous content

            if (cert.isPdf) {
                // Use iframe to display PDF
                modalBody.innerHTML = `<iframe src="${cert.file}"></iframe>`;
            } else {
                // Use img to display PNG/JPG
                modalBody.innerHTML = `<img src="${cert.file}" alt="${cert.title}">`;
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto'; // Restore background scrolling
            setTimeout(() => {
                modalBody.innerHTML = ''; // Clear iframe out of DOM after transition
            }, 300);
        }

        // Close when clicking outside the modal content
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
